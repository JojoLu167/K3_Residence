<!DOCTYPE html>
<head>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mapK3.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/map.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
<main>
    <section class="title-bar">
        <h1 data-i18n="map.title">Map</h1>
    </section>
</main>


<div id="navbar-container"></div>

<script src="javaScript/lan.js"></script>
<script src="javaScript/loadNavbar.js"></script>
<script src="javaScript/map.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadNavbar()
    })
</script>

<div class="map-layout">

<div class="map-sidebar">

<h3>Orte</h3>

<div class="category">
<h4>Lebensmittel</h4>
<ul>
<li onclick="focusMarker('rewe')">Rewe</li>
<li onclick="focusMarker('kaufland')">Kaufland</li>
<li onclick="focusMarker('aldi')">Aldi</li>
<li onclick="focusMarker('lidl')">Lidl</li>
</ul>
</div>

<div class="category">
<h4>Drogerie</h4>
<ul>
<li onclick="focusMarker('mueller')">Müller</li>
<li onclick="focusMarker('dm')">DM</li>
</ul>
</div>

<div class="category">
<h4>Apotheke</h4>
<ul>
<li onclick="focusMarker('apo')">Sonnen-Apotheke</li>
</ul>
</div>

<div class="category">
<h4>Transport</h4>
<ul>
<li onclick="focusMarker('arena')">Bretzenheim Arena</li>
<li onclick="focusMarker('campusbruecke')">Campusbrücke</li>
<li onclick="focusMarker('kisselberg')">Kisselberg</li>
</ul>
</div>

<div class="category">
<h4>Service</h4>
<ul>
<li onclick="focusMarker('sw')">Studierendenwerk</li>
</ul>
</div>

</div>

<div id="map"></div>

</div>


</body>
</html>
